<!DOCTYPE html>
<html>

<head>
    <title>My Busy Day Schedule</title>

    <style>

        body{
            font-family: Georgia, serif;
            background-color:#f8f4ef;
        }

        h1{
            text-align:center;
            color:#7a1f2b;
        }

        table{
            width:700px;
            margin:auto;
            border-collapse:collapse;
            border:4px solid #7a1f2b;
            box-shadow:4px 4px 12px gray;
        }

        th{
            background-color:#7a1f2b;
            color:white;
            padding:14px;
            font-size:20px;
        }

        td{
            border:1px solid #7a1f2b;
            padding:12px;
            text-align:center;
        }

        .time{
            background-color:#f9d9df;
            font-weight:bold;
        }

        #school{
            background-color:#dceeff;
        }

        #council{
            background-color:#ffe4e1;
        }

        #amanc{
            background-color:#d8f3dc;
        }

        #aware{
            background-color:#eee3ff;
        }

    </style>

</head>

<body>

<h1>My Busy Day Schedule</h1>

<table>

<tr>
    <th>Time</th>
    <th>Activity</th>
</tr>

<tr>
    <td class="time">6:00 AM</td>
    <td>Wake up</td>
</tr>

<tr>
    <td class="time">6:20 AM</td>
    <td>Get ready for school</td>
</tr>

<tr id="school">
    <td class="time">7:00 AM</td>
    <td>Attend classes</td>
</tr>

<tr id="council">
    <td class="time">3:00 PM</td>
    <td>Student Council meeting</td>
</tr>

<tr id="amanc">
    <td class="time">4:00 PM</td>
    <td>Volunteer at AMANC</td>
</tr>

<tr>
    <td class="time">7:00 PM</td>
    <td>Return home</td>
</tr>

<tr id="aware">
    <td class="time">8:00 PM</td>
    <td>Work on Aware Roots</td>
</tr>

<tr>
    <td class="time">9:30 PM</td>
    <td>Complete homework</td>
</tr>

<tr>
    <td class="time">10:30 PM</td>
    <td>Prepare for the next day</td>
</tr>

<tr>
    <td class="time">11:00 PM</td>
    <td>Go to sleep</td>
</tr>

</table>

</body>

</html>
